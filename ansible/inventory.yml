all:
  vars:
    ansible_user: ubuntu
    ansible_ssh_private_key_file: ~/.ssh/id_rsa
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o ProxyJump=ubuntu@178.154.225.126'

  children:
    webservers:
      hosts:
        web1.ru-central1.internal:
        web2.ru-central1.internal:

    monitoring:
      hosts:
        zabbix.ru-central1.internal:

    elastic_hosts:
      hosts:
        elastic.ru-central1.internal:

    kibana_hosts:
      hosts:
        kibana.ru-central1.internal:

    bastion:
      vars:
        ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
      hosts:
        bastion.ru-central1.internal:
          ansible_host: 178.154.225.126
